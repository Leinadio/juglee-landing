<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fc4e4e" stop-opacity="1"/>
      <stop offset="100%" stop-color="#d0a0ff" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d0a0ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#fc4e4e" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="400" fill="#0F0F0F"/>

  <!-- Ambient glow orbs -->
  <circle cx="250" cy="180" r="160" fill="#fc4e4e" opacity="0.12" filter="url(#softglow)"/>
  <circle cx="550" cy="160" r="180" fill="#d0a0ff" opacity="0.1" filter="url(#softglow)"/>

  <!-- Grid pattern -->
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="0.5">
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
  </g>

  <!-- Central shield -->
  <g transform="translate(400, 175)" filter="url(#glow)">
    <!-- Shield shape -->
    <path d="M0 -80 L65 -52 L65 12 C65 58 35 88 0 105 C-35 88 -65 58 -65 12 L-65 -52 Z"
          fill="url(#g1)" opacity="0.4" stroke="url(#g1)" stroke-width="2"/>
    <!-- Inner shield -->
    <path d="M0 -58 L45 -37 L45 10 C45 44 24 64 0 76 C-24 64 -45 44 -45 10 L-45 -37 Z"
          fill="none" stroke="url(#g1)" stroke-width="1.2" opacity="0.7"/>
    <!-- Lock body -->
    <rect x="-16" y="-6" width="32" height="25" rx="5" fill="none" stroke="url(#g1)" stroke-width="2" opacity="1"/>
    <!-- Lock shackle -->
    <path d="M-9 -6 L-9 -18 C-9 -28 9 -28 9 -18 L9 -6" fill="none" stroke="url(#g1)" stroke-width="2" opacity="1"/>
    <!-- Lock keyhole -->
    <circle cx="0" cy="7" r="4" fill="url(#g1)" opacity="1"/>
    <rect x="-2" y="7" width="4" height="8" rx="1.5" fill="url(#g1)" opacity="1"/>
  </g>

  <!-- Floating nodes connected by lines (network/encryption motif) -->
  <g stroke="url(#g2)" stroke-width="1.2" opacity="0.7">
    <!-- Left cluster -->
    <line x1="120" y1="100" x2="200" y2="160"/>
    <line x1="200" y1="160" x2="160" y2="260"/>
    <line x1="120" y1="100" x2="160" y2="260"/>
    <line x1="200" y1="160" x2="335" y2="175"/>

    <!-- Right cluster -->
    <line x1="680" y1="90" x2="600" y2="170"/>
    <line x1="600" y1="170" x2="660" y2="280"/>
    <line x1="680" y1="90" x2="660" y2="280"/>
    <line x1="600" y1="170" x2="465" y2="175"/>

    <!-- Top connections -->
    <line x1="120" y1="100" x2="300" y2="60"/>
    <line x1="300" y1="60" x2="500" y2="60"/>
    <line x1="500" y1="60" x2="680" y2="90"/>

    <!-- Bottom connections -->
    <line x1="160" y1="260" x2="320" y2="310"/>
    <line x1="320" y1="310" x2="480" y2="310"/>
    <line x1="480" y1="310" x2="660" y2="280"/>
  </g>

  <!-- Nodes -->
  <g fill="url(#g1)" filter="url(#glow)">
    <circle cx="120" cy="100" r="5" opacity="0.9"/>
    <circle cx="200" cy="160" r="4.5" opacity="0.85"/>
    <circle cx="160" cy="260" r="4.5" opacity="0.85"/>
    <circle cx="300" cy="60" r="4" opacity="0.8"/>
    <circle cx="500" cy="60" r="4" opacity="0.8"/>
    <circle cx="680" cy="90" r="5" opacity="0.9"/>
    <circle cx="600" cy="170" r="4.5" opacity="0.85"/>
    <circle cx="660" cy="280" r="4.5" opacity="0.85"/>
    <circle cx="320" cy="310" r="4" opacity="0.8"/>
    <circle cx="480" cy="310" r="4" opacity="0.8"/>
  </g>

  <!-- Orbiting rings around shield -->
  <g transform="translate(400, 175)">
    <ellipse cx="0" cy="0" rx="110" ry="110" fill="none" stroke="url(#g2)" stroke-width="0.8" stroke-dasharray="5 8" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="140" ry="75" fill="none" stroke="url(#g2)" stroke-width="0.7" stroke-dasharray="4 10" opacity="0.4" transform="rotate(30)"/>
    <ellipse cx="0" cy="0" rx="150" ry="85" fill="none" stroke="url(#g2)" stroke-width="0.7" stroke-dasharray="4 10" opacity="0.35" transform="rotate(-20)"/>
  </g>

  <!-- Small data particles -->
  <g fill="#d0a0ff" opacity="0.6">
    <rect x="250" y="130" width="7" height="7" rx="1" transform="rotate(45 253 133)"/>
    <rect x="540" y="120" width="6" height="6" rx="1" transform="rotate(45 543 123)"/>
    <rect x="180" y="320" width="5" height="5" rx="1" transform="rotate(45 182 322)"/>
    <rect x="620" y="330" width="5" height="5" rx="1" transform="rotate(45 622 332)"/>
  </g>
  <g fill="#fc4e4e" opacity="0.6">
    <rect x="330" y="340" width="6" height="6" rx="1" transform="rotate(45 333 343)"/>
    <rect x="470" y="80" width="6" height="6" rx="1" transform="rotate(45 473 83)"/>
    <rect x="700" y="200" width="5" height="5" rx="1" transform="rotate(45 702 202)"/>
    <rect x="80" y="190" width="5" height="5" rx="1" transform="rotate(45 82 192)"/>
  </g>
</svg>